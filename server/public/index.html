<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>18+ Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script>
  window.__API_BASE = location.origin.replace(/\/+$/, "");
</script>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Inter',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a url('/beck.png') center center / cover no-repeat fixed;
}

.card{
  width:92%;
  max-width:420px;
  background:white;
  padding:34px 28px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
  text-align:center;
}

h2{
  font-size:26px;
  font-weight:800;
  margin-bottom:8px;
  color:#111;
}

p{
  font-size:15px;
  font-weight:500;
  color:#444;
}

#reason{
  font-size:13px;
  margin-top:6px;
  color:#e53935;
  min-height:18px;
}

.access-row{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:18px;
  display:none;
}

.access-row input{
  width:170px;
  padding:10px 12px;
  font-size:14px;
  font-weight:600;
  border-radius:10px;
  border:1px solid #d6dde8;
  outline:none;
  transition:.2s;
  text-transform:uppercase;
}

.access-row input:focus{
  border-color:#5c6cff;
}

button{
  padding:12px 18px;
  border-radius:12px;
  border:none;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  transition:.2s;
}

.primary{
  width:100%;
  margin-top:16px;
  background:#5c6cff;
  color:white;
}

.secondary{
  width:100%;
  margin-top:12px;
  background:#eef1ff;
  color:#5c6cff;
}

.success{
  width:100%;
  margin-top:14px;
  background:#00c853;
  color:white;
}

button:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

#enterBtn{
  display:none;
}

#accessStatus{
  font-size:12px;
  margin-top:8px;
  color:#666;
  min-height:16px;
}

#note {
  font-size:12px;
  color:#666;
  margin-top:10px;
  min-height:16px;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="title"></h2>
  <p id="text"></p>
  <div id="reason"></div>

  <div class="access-row">
    <input id="accessCodeInput" autocomplete="off"/>
    <button id="claimCodeBtn"></button>
  </div>

  <div id="accessStatus"></div>

  <button id="installerCheckBtn" class="secondary"></button>
  <button id="startFlowBtn" class="primary" disabled></button>
  <button id="enterBtn" class="success"></button>

  <p id="note"></p>
</div>

<script>
const lang = navigator.language.startsWith("ru") ? "ru" : "en";
document.documentElement.lang = lang;

const t = {
ru:{
  title:"Проверка устройства",
  waiting:"Ожидание…",
  enterCode:"Код доступа",
  activate:"Активировать",
  activateFirst:"Сначала активируйте код.",
  checkingCode:"Проверяем код…",
  invalidCode:"Код недействителен.",
  codeRequired:"Введите код доступа.",
  serviceLoading:"Сервис ещё загружается. Повторите через секунду.",
  codeExpired:"Срок кода истек. Введите новый код доступа.",
  codeActive:(m,s)=>`Код активен. Доступ для этого устройства: ${m}:${String(s).padStart(2,"0")}.`,
  installers:"Проверить инсталлеры",
  start:"Начать проверку",
  restart:"Начать заново",
  enter:"Войти 18+",
  checking:"Проверяем…",
  allowed:"Доступ разрешён",
  success:"Проверка успешно пройдена ✓",
  denied:"Доступ запрещён",
  serverDenied:"Сервер отклонил запрос",
  deniedByServer:"Доступ запрещён сервером",
  error:"Ошибка",
  failed:"Не удалось выполнить проверку"
},
en:{
  title:"Device Verification",
  waiting:"Waiting…",
  enterCode:"Access code",
  activate:"Activate",
  activateFirst:"Activate your code first.",
  checkingCode:"Checking code…",
  invalidCode:"Invalid code.",
  codeRequired:"Enter access code.",
  serviceLoading:"Service is loading. Retry in a second.",
  codeExpired:"Code expired. Enter a new access code.",
  codeActive:(m,s)=>`Code is active. Access for this device: ${m}:${String(s).padStart(2,"0")}.`,
  installers:"Check Installers",
  start:"Start Verification",
  restart:"Start again",
  enter:"Enter 18+",
  checking:"Checking…",
  allowed:"Access Granted",
  success:"Verification completed ✓",
  denied:"Access Denied",
  serverDenied:"Server rejected request",
  deniedByServer:"Access denied by server",
  error:"Error",
  failed:"Verification failed"
}
}[lang];

const titleEl = document.getElementById("title");
const textEl = document.getElementById("text");
const reasonEl = document.getElementById("reason");
const accessCodeInput = document.getElementById("accessCodeInput");
const claimCodeBtn = document.getElementById("claimCodeBtn");
const installerCheckBtn = document.getElementById("installerCheckBtn");
const startFlowBtn = document.getElementById("startFlowBtn");
const enterBtn = document.getElementById("enterBtn");
const accessStatus = document.getElementById("accessStatus");

titleEl.textContent = t.title;
textEl.textContent = t.waiting;
accessCodeInput.placeholder = t.enterCode;
claimCodeBtn.textContent = t.activate;
installerCheckBtn.textContent = t.installers;
startFlowBtn.textContent = t.start;
enterBtn.textContent = t.enter;
startFlowBtn.disabled = false;
accessStatus.textContent = "";

installerCheckBtn.onclick = async () => {
  const schemes = [
    "itms-beta://",
    "altstore://",
    "esign://",
    "gbox://",
    "ksign://",
    "kstore://"
  ];
  for (const s of schemes) {
    try { location.href = s; } catch {}
    await new Promise(r => setTimeout(r, 350));
  }
};

function setAccessReady(code, expiresAt) {
  const exp = Number(expiresAt || 0);
  startFlowBtn.disabled = false;
  accessCodeInput.value = code || accessCodeInput.value;

  if (window.__accessTimer) clearInterval(window.__accessTimer);

  const render = () => {
    const sec = Math.max(0, Math.floor((exp - Date.now()) / 1000));
    const min = Math.floor(sec / 60);
    const rem = sec % 60;

    if (sec <= 0) {
      startFlowBtn.disabled = false;
      accessStatus.textContent = "";
      try {
        localStorage.removeItem("ios_access_code");
        localStorage.removeItem("ios_access_expires_at");
      } catch {}
      if (window.__accessTimer) clearInterval(window.__accessTimer);
      window.__accessTimer = null;
      return;
    }

    accessStatus.textContent = t.codeActive(min, rem);
  };

  render();
  window.__accessTimer = setInterval(render, 1000);
}

claimCodeBtn.onclick = async () => {
  const code = (accessCodeInput.value || "").trim().toUpperCase();
  if (!code) {
    accessStatus.textContent = t.codeRequired;
    return;
  }
  if (typeof window.claimAccessCode !== "function") {
    accessStatus.textContent = t.serviceLoading;
    return;
  }

  accessStatus.textContent = t.checkingCode;
  try {
    const r = await window.claimAccessCode(code);
    setAccessReady(code, r?.accessExpiresAt);
    reasonEl.textContent = "";
  } catch (e) {
    accessStatus.textContent = e?.message || t.invalidCode;
  }
};

window.addEventListener("DOMContentLoaded", () => {
  startFlowBtn.disabled = false;
  if (typeof window.getCurrentAccessCode === "function") {
    const code = window.getCurrentAccessCode();
    if (code) {
      accessCodeInput.value = code;
      try {
        const exp = Number(localStorage.getItem("ios_access_expires_at") || 0);
        if (exp > Date.now()) setAccessReady(code, exp);
      } catch {}
    }
  }
});

startFlowBtn.onclick = async () => {
  startFlowBtn.disabled = true;
  textEl.textContent = t.checking;
  reasonEl.textContent = "";
  titleEl.textContent = t.title;

  try {
    const res = await window.startAutoFlow();
    const allow = res?.decision?.canLaunch === true;

    if (allow) {
      titleEl.textContent = t.allowed;
      textEl.textContent = t.success;
      reasonEl.textContent = "";
      enterBtn.style.display = "block";
      enterBtn.disabled = false;
      startFlowBtn.style.display = "none";
      return;
    }

    titleEl.textContent = t.denied;
    textEl.textContent = t.serverDenied;
    const failText = res?.decision?.reason || res?.decision?.riskLabel || t.deniedByServer;
    reasonEl.textContent = failText;
    startFlowBtn.disabled = false;
    startFlowBtn.textContent = t.restart;
  } catch (e) {
    titleEl.textContent = t.error;
    textEl.textContent = t.failed;
    reasonEl.textContent = e?.message || t.failed;
    startFlowBtn.disabled = false;
  }
};

enterBtn.onclick = () => {
  location.href = "https://www.pubgmobile.com/ig/itop";
};
</script>

<script src="/app.js?v=1000" defer></script>
</body>
</html>
